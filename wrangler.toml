name               = "evil-oirtail"
main               = "index.js"
compatability_date = "2026-03-02"

[containers]
# define the resources for the container
image              = "${IMAGE_NAME}"
instance_type      = "lite"
port               = 80
max_concurrency    = 100
scaling            = { min_instances: 0, max_instances: 1 }
idle_timeout       = "1m"

[ratelimits]
# restrict worker usage
limit              = 60
period             = 60
