name: Build -> Vet -> Push -> Deploy

on:
  push:
    branches: [ main, github-actions ]
    tags-ignore: [ 'v*' ]

# if multiple pushes occur, they could interrupt each other,
# so we tell github/actions to queue up each workflow and let it
# run to completion (or failure) before starting the next workflow in the queue
# ------------------------------------------------------------------------------
concurrency:
  group: production-deploy   # group id
  cancel-in-progress: false  # allow workflow in progress to complete before starting

# Allow the GITHUB_TOKEN to write to the GHCR (GitHub Container Registry)
# ------------------------------------------------------------------------------
permissions:
  contents: write  # Allows check out (read) and tagging (write) of the git repository code
  packages: write  # Allows pushing to GHCR

jobs:
  # The main job
  # ----------------------------------------------------------------------------
  build_vet_push_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: acquire ${{ github.repository }} repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # access to all tags to get latest
      - name: increment semantic version vX.Y.Z
        run: |
          # Get current Semantic Version tag values
          # (--abbrev=0 removes abbreviated commit hash from output)
          # --------------------------------------------------------------------
          readonly latest_tag=\
          "$(git describe --tags --abbrev=0 2>'/dev/null' \
          || printf '%s\n' 'v0.0.-1'
          )"
          readonly major="$(printf '%s\n' "${latest_tag#v}" | cut -d. -f1)"
          readonly minor="$(printf '%s\n' "${latest_tag#v}" | cut -d. -f2)"
          readonly patch="$(printf '%s\n' "${latest_tag#v}" | cut -d. -f3)"
          #
          # Define commit subject line regex patterns for SemVer bump target
          # --------------------------------------------------------------------
          major_pattern='^(major|(api|feat(ure)?|patch|(bug-?)?fix)!)(\([-0-9A-Z_a-z]+\))?:'
          minor_pattern='^(minor|api|feat(ure)?)(\([-0-9A-Z_a-z]\))?:'
          patch_pattern='^(patch|(bug-?)?fix)(\([-0-9A-Z_a-z]\))?:'
          #
          # Compute new Semantic Version
          # --------------------------------------------------------------------
          if   git log -1 --format='%s' | grep -E "${major_pattern}"
          then readonly new_tag="v$((major+1)).0.0"
          elif git log -1 --format='%s' | grep -E "${minor_pattern}"
          then readonly new_tag="v${major}.$((minor+1)).0"
          elif git log -1 --format='%s' | grep -E "${patch_pattern}"
          then readonly new_tag="v${major}.${minor}.$((patch+1))"
          else readonly new_tag="do_not_deploy";
          fi
          printf '%s\n' "version_tag=${new_tag}" | tee -a "${GITHUB_ENV}"
      - name: compute docker image tag name
        run: |
          readonly \
          IMAGE_NAME="$(printf '%s' "ghcr.io/${GITHUB_REPOSITORY}:${version_tag}" | tr '[:upper:]' '[:lower:]')"
          printf '%s\n' "IMAGE_NAME""=${IMAGE_NAME}"           >> "${GITHUB_ENV}"
          printf '%s\n' "IMAGE_LATEST=${IMAGE_NAME%:*}:latest" >> "${GITHUB_ENV}"
      - name: build docker image
        run: |
          docker build                                                                                \
            --tag   "${IMAGE_NAME}"                                                                   \
            --tag   "${IMAGE_LATEST}"                                                                 \
            --label "org.opencontainers.image.title`    `=${{ github.event.repository.name }}"        \
            --label "org.opencontainers.image.description=${{ github.event.repository.description }}" \
            --label "org.opencontainers.image.url`      `=${{ github.event.repository.html_url }}"    \
            --label "org.opencontainers.image.source`   `=${{ github.event.repository.html_url }}"    \
            --label "org.opencontainers.image.revision` `=${{ github.sha }}"                          \
            --label "org.opencontainers.image.version`  `=${IMAGE_NAME##*:}"                          \
            --label "org.opencontainers.image.created`  `=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"           \
            --build-arg "GIT_COMMIT=${{ github.sha }}"                                                \
            --build-arg "IMAGE_NAME=${IMAGE_NAME}"                                                    \
            ./
          docker inspect "${IMAGE_NAME}"
      - name: start docker container
        run: |
          docker run -dp 80:80 --name evil-oirtail "${IMAGE_NAME}"
      - name: evaluate docker image with liatrio apprentice-action@v1.0.0
        uses: liatrio/github-actions/apprentice-action@0b41561cca6822cc8d880fe0e49e7807a41fdf91
      - name: test for minified JSON object
        run: |
          # Assumes return object is parseable JSON, pre-checked by liatrio action tests
          #
          if curl localhost                      \
          |  sed 's/"\(\\.\|[^"\\]\)*"/""/g'     \
          |  { ! grep "[$(printf '\t\v\f\r') ]"; }
          then printf '%s\n' 'pass - JSON is minified'     ; exit 0
          else printf '%s\n' 'FAIL - JSON is NOT minified' ; exit 1
          fi
      - name: stop docker container
        run: |
          docker rm -f evil-oirtail
      - if: ${{ env.version_tag != 'do_not_deploy' }}
        name: login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ env.version_tag != 'do_not_deploy' }}
        name: push to GHCR
        run: |
          docker push "${IMAGE_NAME}"
          docker push "${IMAGE_LATEST}"
      - if: ${{ env.version_tag != 'do_not_deploy' }}
        name: tag git commit
        run: |
          # Configure git user
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Tag commit
          printf '%s\n' "Tagging commit with Semantic Version ${IMAGE_NAME##*:} ..."
          git tag         "${IMAGE_NAME##*:}"
          git push origin "${IMAGE_NAME##*:}"
          printf '%s\n' 'Tagged.'
